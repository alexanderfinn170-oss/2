<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Voice Generator Pro | Multi Language Text To Speech</title>
<meta name="description" content="Professional AI voice generator with multi-language support, male & female voice models and MP3 download.">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{
background:linear-gradient(135deg,#1f1c2c,#928dab);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
color:white;
}
.container{
background:#2c2f4a;
width:100%;
max-width:900px;
padding:30px;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,0.4);
}
h1{text-align:center;margin-bottom:20px}
textarea{
width:100%;
height:150px;
padding:15px;
border-radius:10px;
border:none;
margin-bottom:15px;
font-size:16px;
}
select,button{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:10px;
border:none;
font-size:16px;
}
button{
background:#6a11cb;
color:white;
cursor:pointer;
transition:0.3s;
}
button:hover{
background:#2575fc;
}
audio{width:100%;margin-top:10px}
footer{text-align:center;margin-top:15px;font-size:14px;color:#aaa}
</style>
</head>

<body>

<div class="container">
<h1>🌍 AI Voice Generator Pro</h1>

<textarea id="text" placeholder="Type text in any language..."></textarea>

<select id="language">
<option value="en">English</option>
<option value="bn">Bangla</option>
<option value="hi">Hindi</option>
<option value="ar">Arabic</option>
<option value="es">Spanish</option>
<option value="fr">French</option>
</select>

<select id="voiceModel">
<option value="male">Male Voice</option>
<option value="female">Female Voice</option>
</select>

<button onclick="generateVoice()">🎙 Generate Voice</button>

<audio id="audioPlayer" controls></audio>
<button id="downloadBtn" style="display:none">⬇ Download MP3</button>

<footer>© 2026 AI Voice Pro</footer>
</div>

<script>
const ELEVEN_API_KEY = "PASTE_YOUR_ELEVENLABS_API_KEY";

async function generateVoice(){
const text = document.getElementById("text").value;
const lang = document.getElementById("language").value;
const model = document.getElementById("voiceModel").value;

if(!text) return alert("Enter text first");

let voiceId = model === "male"
? "21m00Tcm4TlvDq8ikWAM"
: "EXAVITQu4vr4xnSDxMaL";

const response = await fetch(https://api.elevenlabs.io/v1/text-to-speech/${voiceId},{
method:"POST",
headers:{
"Content-Type":"application/json",
"xi-api-key":ELEVEN_API_KEY
},
body:JSON.stringify({
text:text,
model_id:"eleven_multilingual_v2"
})
});

const audioBlob = await response.blob();
const audioURL = URL.createObjectURL(audioBlob);

document.getElementById("audioPlayer").src = audioURL;
document.getElementById("downloadBtn").style.display="block";

document.getElementById("downloadBtn").onclick = ()=>{
const a = document.createElement("a");
a.href = audioURL;
a.download = "ai-voice.mp3";
a.click();
}
}
</script>

</body>
</html>
