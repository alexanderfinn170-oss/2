<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Voice Generator Pro</title>
<style>
body{
background:linear-gradient(135deg,#141e30,#243b55);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
font-family:sans-serif;
color:white;
}
.container{
background:#1f2937;
padding:30px;
border-radius:20px;
width:100%;
max-width:600px;
}
textarea,select,button{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:none;
}
button{
background:#3b82f6;
color:white;
cursor:pointer;
}
audio{
width:100%;
margin-top:10px;
}
</style>
</head>
<body>

<div class="container">
<h2>🌍 AI Voice Generator</h2>

<textarea id="text" placeholder="Type text in any language"></textarea>

<select id="voice">
<option value="21m00Tcm4TlvDq8ikWAM">Male Voice</option>
<option value="EXAVITQu4vr4xnSDxMaL">Female Voice</option>
</select>

<button onclick="generateVoice()">Generate Voice</button>

<audio id="audio" controls></audio>
<button id="downloadBtn" style="display:none;">Download MP3</button>

</div>

<script>
async function generateVoice(){
const text = document.getElementById("text").value;
const voiceId = document.getElementById("voice").value;

if(!text) return alert("Enter text");

const response = await fetch("https://YOUR-WORKER-URL.workers.dev",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({text,voiceId})
});

const blob = await response.blob();
const url = URL.createObjectURL(blob);

document.getElementById("audio").src = url;

const downloadBtn = document.getElementById("downloadBtn");
downloadBtn.style.display="block";
downloadBtn.onclick = ()=>{
const a=document.createElement("a");
a.href=url;
a.download="ai-voice.mp3";
a.click();
}
}
</script>

</body>
</html>
