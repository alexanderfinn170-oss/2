<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free AI Text To Speech Online | Professional TTS Tool</title>
<meta name="description" content="Convert text to speech online free. Professional AI Text to Voice generator with multiple voices, speed control and download option.">
<meta name="keywords" content="text to speech free, ai voice generator, tts online, free voice maker">
<meta name="author" content="Your Brand Name">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{
background:linear-gradient(135deg,#667eea,#764ba2);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}
.container{
background:white;
width:100%;
max-width:800px;
padding:30px;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,0.2);
}
h1{
text-align:center;
margin-bottom:20px;
color:#333;
font-size:28px;
}
textarea{
width:100%;
height:150px;
padding:15px;
border-radius:10px;
border:1px solid #ccc;
resize:none;
margin-bottom:20px;
font-size:16px;
}
.controls{
display:flex;
gap:15px;
flex-wrap:wrap;
margin-bottom:20px;
}
select,input{
flex:1;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}
.buttons{
display:flex;
gap:15px;
}
button{
flex:1;
padding:12px;
border:none;
border-radius:8px;
background:#667eea;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}
button:hover{
background:#764ba2;
}
footer{
margin-top:20px;
text-align:center;
font-size:14px;
color:#666;
}
@media(max-width:600px){
.controls{flex-direction:column}
.buttons{flex-direction:column}
}
</style>
</head>

<body>

<div class="container">
<h1>Free AI Text To Speech Generator</h1>

<textarea id="text" placeholder="Type your text here..."></textarea>

<div class="controls">
<select id="voiceSelect"></select>
<input type="range" id="rate" min="0.5" max="2" step="0.1" value="1">
<input type="range" id="pitch" min="0.5" max="2" step="0.1" value="1">
</div>

<div class="buttons">
<button onclick="speakText()">🔊 Speak</button>
<button onclick="stopText()">⛔ Stop</button>
</div>

<footer>
© 2026 Your Brand | Free Online Text To Speech Tool
</footer>
</div>

<script>
const voiceSelect = document.getElementById("voiceSelect");
let voices = [];

function loadVoices() {
voices = speechSynthesis.getVoices();
voiceSelect.innerHTML = "";
voices.forEach((voice, index) => {
const option = document.createElement("option");
option.value = index;
option.textContent = voice.name + " (" + voice.lang + ")";
voiceSelect.appendChild(option);
});
}

speechSynthesis.onvoiceschanged = loadVoices;

function speakText() {
const text = document.getElementById("text").value;
if(text === "") return alert("Please enter text");

const utterance = new SpeechSynthesisUtterance(text);
utterance.voice = voices[voiceSelect.value];
utterance.rate = document.getElementById("rate").value;
utterance.pitch = document.getElementById("pitch").value;

speechSynthesis.speak(utterance);
}

function stopText(){
speechSynthesis.cancel();
}
</script>

</body>
</html>
